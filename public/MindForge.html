<script>
'use strict';
// ─── Utilities ───────────────────────────────────────────────────────────────
function uid(){return'n'+Math.random().toString(36).slice(2)+Date.now().toString(36)}

// ─── Model ───────────────────────────────────────────────────────────────────
const DEF={bgColor:'#1e1e2e',textColor:'#f0f0f8',fontSize:16,fontStyle:'normal',lineType:'solid',lineWidth:'medium',image:null,link:null};

function createNode(text='',parentId=null,ov={}){return{id:uid(),text,parentId,children:[],...DEF,...ov}}
function createRootNode(text){return{...createNode(text,null),bgColor:'#2d1b69',textColor:'#f0f0f8',fontSize:24,fontStyle:'bold'}}
function createMap(name){const r=createRootNode(name);return{id:uid(),name,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),theme:'dark',nodes:{[r.id]:r},rootId:r.id}}

function addChildNode(nodes,parentId,text=''){
  const child=createNode(text,parentId);
  const u={...nodes,[child.id]:child};
  u[parentId]={...u[parentId],children:[...u[parentId].children,child.id]};
  return{nodes:u,newNodeId:child.id};
}
function addSiblingNode(nodes,nodeId){
  const n=nodes[nodeId];
  if(!n||!n.parentId)return{nodes,newNodeId:null};
  return addChildNode(nodes,n.parentId,'');
}
function getDescendants(nodes,nodeId){
  const ids=[];const q=[...nodes[nodeId]?.children||[]];
  while(q.length){const id=q.shift();ids.push(id);q.push(...(nodes[id]?.children||[]))}
  return ids;
}
function deleteNode(nodes,nodeId,rootId){
  if(nodeId===rootId)return nodes;
  const all=new Set([nodeId,...getDescendants(nodes,nodeId)]);
  const u={};
  for(const[id,n]of Object.entries(nodes))
    if(!all.has(id))u[id]={...n,children:n.children.filter(c=>!all.has(c))};
  return u;
}
function updateNode(nodes,nodeId,ch){
  if(!nodes[nodeId])return nodes;
  return{...nodes,[nodeId]:{...nodes[nodeId],...ch}};
}
function reorderChildren(nodes,parentId,from,to){
  const p=nodes[parentId];if(!p)return nodes;
  const ch=[...p.children];const[m]=ch.splice(from,1);ch.splice(to,0,m);
  return{...nodes,[parentId]:{...p,children:ch}};
}
function cloneSubtree(nodes,nodeId,newParentId){
  const idMap={};const u={...nodes};
  function rec(nid,pid){
    const o=nodes[nid];const newId=uid();idMap[nid]=newId;
    u[newId]={...o,id:newId,parentId:pid,children:[]};
    for(const cid of o.children){rec(cid,newId);u[newId]={...u[newId],children:[...u[newId].children,idMap[cid]]}}
    return newId;
  }
  const newRoot=rec(nodeId,newParentId);
  u[newParentId]={...u[newParentId],children:[...u[newParentId].children,newRoot]};
  return{nodes:u,newNodeId:newRoot};
}
function mapToText(nodes,rootId,indent=0){
  const n=nodes[rootId];if(!n)return'';
  const p='  '.repeat(indent)+(indent===0?'● ':'◦ ');
  return[p+(n.text||'(sem texto)'),...n.children.map(c=>mapToText(nodes,c,indent+1))].join('\n');
}

// ─── Themes ───────────────────────────────────────────────────────────────────
const THEMES={
  dark:{name:'Escuro',emoji:'🌑',canvasBg:'#09090f',nodeDefaults:{bgColor:'#1e1e2e',textColor:'#f0f0f8'},rootDefaults:{bgColor:'#2d1b69',textColor:'#f0f0f8'},edgeColor:'rgba(124,92,252,0.5)',gridColor:'rgba(255,255,255,0.025)'},
  midnight:{name:'Meia-noite',emoji:'🌌',canvasBg:'#060912',nodeDefaults:{bgColor:'#0f1729',textColor:'#c8d8f8'},rootDefaults:{bgColor:'#0f3460',textColor:'#e0f0ff'},edgeColor:'rgba(92,156,252,0.5)',gridColor:'rgba(255,255,255,0.02)'},
  forest:{name:'Floresta',emoji:'🌿',canvasBg:'#0a120a',nodeDefaults:{bgColor:'#0f2010',textColor:'#c8f0c8'},rootDefaults:{bgColor:'#1a4a1a',textColor:'#e0f8e0'},edgeColor:'rgba(92,200,92,0.5)',gridColor:'rgba(255,255,255,0.02)'},
  ember:{name:'Brasa',emoji:'🔥',canvasBg:'#120a08',nodeDefaults:{bgColor:'#2a1008',textColor:'#f8d8b8'},rootDefaults:{bgColor:'#6b2000',textColor:'#ffe8c8'},edgeColor:'rgba(252,120,60,0.5)',gridColor:'rgba(255,255,255,0.02)'},
  ocean:{name:'Oceano',emoji:'🌊',canvasBg:'#040c14',nodeDefaults:{bgColor:'#081828',textColor:'#b8e0f8'},rootDefaults:{bgColor:'#005580',textColor:'#e0f4ff'},edgeColor:'rgba(60,180,252,0.5)',gridColor:'rgba(255,255,255,0.02)'},
  light:{name:'Claro',emoji:'☀️',canvasBg:'#f4f4f8',nodeDefaults:{bgColor:'#ffffff',textColor:'#1a1a2e'},rootDefaults:{bgColor:'#5c3fc8',textColor:'#ffffff'},edgeColor:'rgba(92,63,200,0.4)',gridColor:'rgba(0,0,0,0.04)'},
  pastel:{name:'Pastel',emoji:'🌸',canvasBg:'#fdf6ff',nodeDefaults:{bgColor:'#fff0fc',textColor:'#4a2060'},rootDefaults:{bgColor:'#d4a0e8',textColor:'#3a1060'},edgeColor:'rgba(180,100,220,0.4)',gridColor:'rgba(180,100,220,0.05)'},
};

// ─── Layout ───────────────────────────────────────────────────────────────────
const NW=180,NH=52,HG=90,VG=28;
function computeLayout(nodes,rootId){
  if(!nodes[rootId])return{};
  const sizes={};
  function sz(id){
    const n=nodes[id];if(!n)return{w:NW,h:NH};
    if(!n.children.length){sizes[id]={w:NW,h:NH};return sizes[id]}
    let th=0;n.children.forEach((c,i)=>{const cs=sz(c);th+=cs.h+(i<n.children.length-1?VG:0)});
    sizes[id]={w:NW,h:Math.max(NH,th)};return sizes[id];
  }
  sz(rootId);
  const pos={};
  function place(id,x,cy){
    pos[id]={x,y:cy-NH/2};
    const n=nodes[id];if(!n||!n.children.length)return;
    const cx=x+NW+HG;
    let th=0;n.children.forEach((c,i)=>th+=sizes[c].h+(i<n.children.length-1?VG:0));
    let cur=cy-th/2;
    n.children.forEach(c=>{const s=sizes[c];place(c,cx,cur+s.h/2);cur+=s.h+VG});
  }
  place(rootId,0,0);
  const minY=Math.min(...Object.values(pos).map(p=>p.y));
  const res={};
  for(const[id,p]of Object.entries(pos))res[id]={x:p.x,y:p.y-(minY<0?minY:0),w:NW,h:NH};
  return res;
}
function getBounds(layout){
  const vs=Object.values(layout);
  if(!vs.length)return{w:0,h:0,minX:0,minY:0};
  return{w:Math.max(...vs.map(p=>p.x))+NW,h:Math.max(...vs.map(p=>p.y))+NH};
}

// ─── File System ─────────────────────────────────────────────────────────────
let _mmDir=null;
function sanitizeName(n){return n.replace(/[<>:"/\\|?*\x00-\x1f]/g,'_').trim()||'mapa'}
const FS={
  supported:()=>'showDirectoryPicker' in window,
  ready:()=>!!_mmDir,
  async init(){
    const base=await window.showDirectoryPicker({mode:'readwrite',startIn:'documents'});
    _mmDir=await base.getDirectoryHandle('MINDFORGE',{create:true});
    return true;
  },
  async list(){
    const maps=[];
    for await(const e of _mmDir.values()){
      if(e.kind==='file'&&e.name.endsWith('.json')){
        try{const f=await e.getFile();const d=JSON.parse(await f.text());
          maps.push({name:e.name.replace('.json',''),fileName:e.name,updatedAt:d.updatedAt||f.lastModified,id:d.id});
        }catch(e2){console.warn(e2)}
      }
    }
    return maps.sort((a,b)=>new Date(b.updatedAt)-new Date(a.updatedAt));
  },
  async load(fileName){const fh=await _mmDir.getFileHandle(fileName);return JSON.parse(await(await fh.getFile()).text())},
  async save(map){
    const fn=sanitizeName(map.name)+'.json';
    const fh=await _mmDir.getFileHandle(fn,{create:true});
    const w=await fh.createWritable();await w.write(JSON.stringify(map,null,2));await w.close();
    return fn;
  },
  async delete(fn){await _mmDir.removeEntry(fn)},
  async rename(oldFn,newName){
    const fh=await _mmDir.getFileHandle(oldFn);const d=JSON.parse(await(await fh.getFile()).text());
    d.name=newName;d.updatedAt=new Date().toISOString();
    const nfn=sanitizeName(newName)+'.json';
    const nfh=await _mmDir.getFileHandle(nfn,{create:true});
    const w=await nfh.createWritable();await w.write(JSON.stringify(d,null,2));await w.close();
    if(oldFn!==nfn)await _mmDir.removeEntry(oldFn);
    return{fileName:nfn,data:d};
  },
};

// ─── Store ────────────────────────────────────────────────────────────────────
const {useState:us,useEffect:ue,useCallback:uc,useMemo:um,useRef:ur,createElement:ce}=React;

let _state={
  map:null,fileName:null,selectedId:null,editingId:null,
  clipboard:null,styleClipboard:null,
  history:[],histIdx:-1,
  zoom:1,panX:0,panY:0,
};
const _listeners=new Set();
function getState(){return _state}
function setState(fn){
  const next={..._state};fn(next);_state=next;
  _listeners.forEach(l=>l());
}
function useStore(sel){
  const[v,sv]=us(()=>sel(_state));
  ue(()=>{
    const cb=()=>sv(sel(_state));
    _listeners.add(cb);return()=>_listeners.delete(cb);
  },[sel]);
  return v;
}

let _saveTO=null;
function schedSave(map){
  clearTimeout(_saveTO);
  _saveTO=setTimeout(()=>{if(map&&FS.ready())FS.save(map).catch(console.error)},600);
}
function pushHistory(nodes){
  setState(s=>{
    const snap=JSON.parse(JSON.stringify(nodes));
    s.history=s.history.slice(0,s.histIdx+1);
    s.history.push(snap);
    if(s.history.length>200)s.history.shift();else s.histIdx++;
  });
}

const actions={
  openMap(map,fileName){
    setState(s=>{s.map=map;s.fileName=fileName;s.selectedId=map.rootId;s.editingId=null;
      s.history=[JSON.parse(JSON.stringify(map.nodes))];s.histIdx=0;s.zoom=1;s.panX=0;s.panY=0;
      s.clipboard=null});
  },
  closeMap(){setState(s=>{s.map=null;s.fileName=null;s.selectedId=null;s.editingId=null;s.history=[];s.histIdx=-1})},
  selectNode(id){setState(s=>{s.selectedId=id})},
  startEditing(id){setState(s=>{s.editingId=id;s.selectedId=id})},
  stopEditing(){setState(s=>{s.editingId=null})},
  setZoom(z){setState(s=>{s.zoom=Math.max(0.15,Math.min(4,z))})},
  setPan(x,y){setState(s=>{s.panX=x;s.panY=y})},
  resetView(){setState(s=>{s.zoom=1;s.panX=0;s.panY=0})},

  mutate(fn){
    setState(s=>{if(!s.map)return;s.map={...s.map,nodes:fn(s.map.nodes),updatedAt:new Date().toISOString()}});
    const m=getState().map;pushHistory(m.nodes);schedSave(m);
  },
  updateOnly(fn){
    setState(s=>{if(!s.map)return;s.map={...s.map,nodes:fn(s.map.nodes),updatedAt:new Date().toISOString()}});
    schedSave(getState().map);
  },

  addChild(parentId){
    let nid=null;
    setState(s=>{if(!s.map)return;const r=addChildNode(s.map.nodes,parentId,'');
      s.map={...s.map,nodes:r.nodes,updatedAt:new Date().toISOString()};
      nid=r.newNodeId;s.selectedId=nid;s.editingId=nid});
    const m=getState().map;pushHistory(m.nodes);schedSave(m);return nid;
  },
  addSibling(nodeId){
    let nid=null;
    setState(s=>{if(!s.map)return;const r=addSiblingNode(s.map.nodes,nodeId);
      s.map={...s.map,nodes:r.nodes,updatedAt:new Date().toISOString()};
      nid=r.newNodeId;s.selectedId=nid;s.editingId=nid});
    const m=getState().map;pushHistory(m.nodes);schedSave(m);return nid;
  },
  deleteNode(nodeId){
    setState(s=>{if(!s.map||nodeId===s.map.rootId)return;
      const parentId=s.map.nodes[nodeId]?.parentId;
      s.map={...s.map,nodes:deleteNode(s.map.nodes,nodeId,s.map.rootId),updatedAt:new Date().toISOString()};
      s.selectedId=parentId||s.map.rootId;s.editingId=null});
    const m=getState().map;pushHistory(m.nodes);schedSave(m);
  },
  commitText(nodeId,text){
    const{map}=getState();if(!map)return;
    if(!text.trim()&&nodeId!==map.rootId){actions.deleteNode(nodeId);return}
    setState(s=>{if(!s.map)return;
      s.map={...s.map,nodes:{...s.map.nodes,[nodeId]:{...s.map.nodes[nodeId],text}},updatedAt:new Date().toISOString()};
      s.editingId=null});
    const m=getState().map;pushHistory(m.nodes);schedSave(m);
  },
  updateNode(nodeId,ch){actions.updateOnly(n=>updateNode(n,nodeId,ch))},
  reorder(parentId,from,to){actions.mutate(n=>reorderChildren(n,parentId,from,to))},

  copy(nodeId){
    const{map}=getState();if(!map)return;
    setState(s=>{s.clipboard={type:'copy',nodeId}});
  },
  cut(nodeId){
    const{map}=getState();if(!map||nodeId===map.rootId)return;
    actions.copy(nodeId);setState(s=>{if(s.clipboard)s.clipboard.type='cut'});
    actions.deleteNode(nodeId);
  },
  paste(targetId){
    const{clipboard,map}=getState();if(!clipboard||!map)return;
    setState(s=>{if(!s.map||!s.clipboard)return;
      const r=cloneSubtree(s.map.nodes,s.clipboard.nodeId,targetId);
      s.map={...s.map,nodes:r.nodes,updatedAt:new Date().toISOString()};
      if(r.newNodeId)s.selectedId=r.newNodeId});
    const m=getState().map;pushHistory(m.nodes);schedSave(m);
  },
  copyStyle(nodeId){
    const{map}=getState();if(!map)return;
    const n=map.nodes[nodeId];if(!n)return;
    setState(s=>{s.styleClipboard={bgColor:n.bgColor,textColor:n.textColor,fontSize:n.fontSize,fontStyle:n.fontStyle,lineType:n.lineType,lineWidth:n.lineWidth}});
  },
  pasteStyle(nodeId){
    const{styleClipboard}=getState();if(!styleClipboard)return;
    actions.updateNode(nodeId,styleClipboard);
    const m=getState().map;pushHistory(m.nodes);schedSave(m);
  },
  undo(){
    setState(s=>{if(s.histIdx<=0||!s.map)return;s.histIdx--;
      s.map={...s.map,nodes:JSON.parse(JSON.stringify(s.history[s.histIdx])),updatedAt:new Date().toISOString()};
      s.editingId=null});
    schedSave(getState().map);
  },
  redo(){
    setState(s=>{if(s.histIdx>=s.history.length-1||!s.map)return;s.histIdx++;
      s.map={...s.map,nodes:JSON.parse(JSON.stringify(s.history[s.histIdx])),updatedAt:new Date().toISOString()};
      s.editingId=null});
    schedSave(getState().map);
  },
  setTheme(t){setState(s=>{if(s.map)s.map={...s.map,theme:t}});schedSave(getState().map)},
};

// ── HomePage 
function HomePage(){
  const[maps,setMaps]=us([]);
  const[loading,setLoading]=us(true);
  const[renamingId,setRenamingId]=us(null);

// ── ContextMenu ──
function ContextMenu({x,y,nodeId,isRoot,onClose}){
  const{clipboard,styleClipboard}=getState();
  ue(()=>{
    const h=()=>onClose();
    window.addEventListener('click',h);window.addEventListener('contextmenu',h);
    return()=>{window.removeEventListener('click',h);window.removeEventListener('contextmenu',h)};
  },[onClose]);
  const items=[
    {label:'✏️ Editar',action:()=>{actions.startEditing(nodeId)}},
    {label:'➕ Filho',action:()=>actions.addChild(nodeId)},
    ...(!isRoot?[{label:'↔️ Irmão',action:()=>actions.addSibling(nodeId)}]:[]),
    null,
    {label:'📋 Copiar',action:()=>actions.copy(nodeId)},
    ...(!isRoot?[{label:'✂️ Recortar',action:()=>actions.cut(nodeId)}]:[]),
    ...(clipboard?[{label:'📌 Colar filho',action:()=>actions.paste(nodeId)}]:[]),
    null,
    {label:'🎨 Copiar estilo',action:()=>actions.copyStyle(nodeId)},
    ...(styleClipboard?[{label:'🖌️ Colar estilo',action:()=>actions.pasteStyle(nodeId)}]:[]),
    ...(!isRoot?[null,{label:'🗑️ Excluir',action:()=>actions.deleteNode(nodeId),danger:true}]:[]),
  ];
  return h('div',{
    style:{position:'fixed',left:x,top:y,zIndex:9999,background:'var(--bg4)',border:'1px solid var(--b2)',borderRadius:'var(--r2)',padding:'4px',minWidth:'172px',boxShadow:'0 8px 32px rgba(0,0,0,.6)'},
    onClick:e=>e.stopPropagation()
  },items.map((item,i)=>item===null?
    h('div',{key:i,style:{height:'1px',background:'var(--b1)',margin:'3px 0'}}):
    h('button',{key:item.label,
      style:{display:'flex',alignItems:'center',gap:'7px',width:'100%',padding:'7px 10px',borderRadius:'var(--r1)',fontSize:'.84rem',color:item.danger?'#fc5c8a':'var(--t1)',transition:'background .1s',textAlign:'left'},
      onMouseEnter:e=>{e.currentTarget.style.background=item.danger?'rgba(252,92,138,.1)':'var(--bg5)'},
      onMouseLeave:e=>{e.currentTarget.style.background=''},
      onClick:()=>{item.action();onClose()}
    },item.label)));
}

function MindMapNode({node,isSelected,isEditing,isRoot,siblings,siblingIndex}){
  const[editText,setEditText]=us(node.text);
  const[ctx,setCtx]=us(null);
  const[dragOver,setDragOver]=us(false);
  const[dragging,setDragging]=us(false);
  const taRef=ur(null);

  ue(()=>{if(isEditing&&taRef.current){taRef.current.focus();taRef.current.select();setEditText(node.text)}},[isEditing,node.text]);

  const commit=uc(()=>actions.commitText(node.id,editText),[node.id,editText]);

  const fw=node.fontStyle?.includes('bold')?700:400;
  const fi=node.fontStyle?.includes('italic')?'italic':'normal';

  const border=isSelected?`2px solid rgba(124,92,252,.9)`:dragOver?'2px dashed rgba(124,92,252,.55)':`1px solid ${isRoot?'rgba(255,255,255,.14)':'rgba(255,255,255,.07)'}`;
  const shadow=isSelected?'0 0 0 3px rgba(124,92,252,.22),0 4px 18px rgba(0,0,0,.45)':'0 2px 8px rgba(0,0,0,.3)';

  return h(React.Fragment,null,
    h('div',{
      style:{width:NW+'px',minHeight:NH+'px',borderRadius:isRoot?'12px':'9px',display:'flex',alignItems:'center',padding:'8px 11px',position:'relative',cursor:'pointer',fontFamily:'var(--fb)',background:node.bgColor,color:node.textColor,fontSize:(node.fontSize||16)+'px',fontWeight:fw,fontStyle:fi,border,boxShadow:shadow,opacity:dragging?.4:1,transition:'transform .1s,box-shadow .1s',boxSizing:'border-box'},
      onClick:e=>{e.stopPropagation();actions.selectNode(node.id)},
      onDoubleClick:e=>{e.stopPropagation();actions.startEditing(node.id)},
      onContextMenu:e=>{e.preventDefault();e.stopPropagation();actions.selectNode(node.id);setCtx({x:e.clientX,y:e.clientY})},
      onMouseEnter:e=>{if(!isSelected)e.currentTarget.style.transform='translateY(-1px)'},
      onMouseLeave:e=>{e.currentTarget.style.transform=''},
      draggable:!isRoot&&!isEditing,
      onDragStart:e=>{e.dataTransfer.setData('nodeId',node.id);e.dataTransfer.setData('parentId',node.parentId||'');e.dataTransfer.setData('sibIdx',siblingIndex);setDragging(true)},
      onDragEnd:()=>setDragging(false),
      onDragOver:e=>{if(node.parentId){e.preventDefault();setDragOver(true)}},
      onDragLeave:()=>setDragOver(false),
      onDrop:e=>{
        e.preventDefault();setDragOver(false);
        const nid=e.dataTransfer.getData('nodeId');
        const pid=e.dataTransfer.getData('parentId');
        const fi=parseInt(e.dataTransfer.getData('sibIdx'),10);

        actions.reorder(node.parentId,fi,siblingIndex);

      onChange:e=>setEditText(e.target.value),
      onBlur:commit,
      onKeyDown:e=>{e.stopPropagation();if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();commit()}if(e.key==='Escape')actions.commitText(node.id,node.text);if(e.key==='Tab'){e.preventDefault();commit();setTimeout(()=>actions.addChild(node.id),60)}}}):
    h('div',{style:{display:'flex',alignItems:'center',gap:'5px',width:'100%',minHeight:'20px',overflow:'hidden'}},
      node.image&&h('img',{src:node.image,alt:'',style:{width:'30px',height:'30px',objectFit:'cover',borderRadius:'4px',flexShrink:0}}),
      h('span',{style:{flex:1,wordBreak:'break-word',overflow:'hidden',display:'-webkit-box',WebkitLineClamp:3,WebkitBoxOrient:'vertical',lineHeight:'1.3'}},
        node.text||h('span',{style:{opacity:.35,fontStyle:'italic',fontSize:'.8em'}},'Clique duplo...')),
      node.link&&h('span',{onClick:e=>{e.stopPropagation();window.open(node.link,'_blank')},style:{flexShrink:0,opacity:.55,cursor:'pointer',fontSize:'11px',display:'flex',alignItems:'center'}},
        '🔗')),
    isSelected&&!isEditing&&h('div',{style:{position:'absolute',top:'-30px',right:'0',display:'flex',gap:'3px',background:'rgba(17,17,24,.92)',border:'1px solid rgba(255,255,255,.1)',borderRadius:'6px',padding:'3px',backdropFilter:'blur(8px)',zIndex:100}},
      h('button',{onClick:e=>{e.stopPropagation();actions.addChild(node.id)},title:'Filho (Tab)',
        style:{width:'22px',height:'22px',display:'flex',alignItems:'center',justifyContent:'center',borderRadius:'4px',color:'rgba(255,255,255,.7)',fontSize:'14px',transition:'background .1s'},
        onMouseEnter:e=>{e.currentTarget.style.background='rgba(124,92,252,.3)'},

      !isRoot&&h('button',{onClick:e=>{e.stopPropagation();actions.addSibling(node.id)},title:'Irmão',
        style:{width:'22px',height:'22px',display:'flex',alignItems:'center',justifyContent:'center',borderRadius:'4px',color:'rgba(255,255,255,.7)',fontSize:'11px',transition:'background .1s'},
        onMouseEnter:e=>{e.currentTarget.style.background='rgba(124,92,252,.3)'},
        onMouseLeave:e=>{e.currentTarget.style.background=''}},'↔'))),
    ctx&&h(ContextMenu,{x:ctx.x,y:ctx.y,nodeId:node.id,isRoot,onClose:()=>setCtx(null)}));

// ── MapCanvas ──
function MapCanvas(){
  const canvasRef=ur(null);
  const isPanning=ur(false);
  const panStart=ur({x:0,y:0});
  const lastPan=ur({x:0,y:0});

  const map=useStore(s=>s.map);
  const selectedId=useStore(s=>s.selectedId);
  const editingId=useStore(s=>s.editingId);
  const zoom=useStore(s=>s.zoom);
  const panX=useStore(s=>s.panX);
  const panY=useStore(s=>s.panY);

  const nodes=map?.nodes||{};
  const rootId=map?.rootId;
  const theme=THEMES[map?.theme||'dark']||THEMES.dark;

  const layout=um(()=>{
    if(!rootId||!nodes[rootId])return{};
    return computeLayout(nodes,rootId);
  },[nodes,rootId]);

  const bounds=um(()=>getBounds(layout),[layout]);

  // Center on open
  ue(()=>{
    if(!canvasRef.current||bounds.w===0)return;
    const{width,height}=canvasRef.current.getBoundingClientRect();
    actions.setPan((width-bounds.w*zoom)/2,(height-bounds.h*zoom)/2);
  },[rootId]);

  // Wheel zoom
  ue(()=>{
    const el=canvasRef.current;if(!el)return;
    const wh=e=>{
      e.preventDefault();
      const delta=e.deltaY>0?-.09:.09;
      const rect=el.getBoundingClientRect();
      const mx=e.clientX-rect.left,my=e.clientY-rect.top;
      const s=getState();
      const nz=Math.max(0.15,Math.min(4,s.zoom+delta));
      const sc=nz/s.zoom;
      actions.setZoom(nz);
      actions.setPan(mx-sc*(mx-s.panX),my-sc*(my-s.panY));
    };
    el.addEventListener('wheel',wh,{passive:false});
    return()=>el.removeEventListener('wheel',wh);
  },[]);

  // Pan
  const mdown=uc(e=>{
    if(e.button!==0)return;
    const t=e.target;
    if(t!==canvasRef.current&&!t.dataset.canvas)return;
    isPanning.current=true;
    panStart.current={x:e.clientX,y:e.clientY};
    const s=getState();lastPan.current={x:s.panX,y:s.panY};
    e.preventDefault();
  },[]);
  const mmove=uc(e=>{
    if(!isPanning.current)return;
    actions.setPan(lastPan.current.x+(e.clientX-panStart.current.x),lastPan.current.y+(e.clientY-panStart.current.y));
  },[]);
  const mup=uc(()=>{isPanning.current=false},[]);

  // Keyboard
  ue(()=>{
    const kh=e=>{
      const s=getState();
      if(s.editingId)return;
      if(!s.selectedId)return;
      if(e.key==='Tab'){e.preventDefault();actions.addChild(s.selectedId)}
      if(e.key==='Enter'){e.preventDefault();const n=s.map?.nodes[s.selectedId];if(n?.parentId)actions.addSibling(s.selectedId)}
      if((e.key==='Delete'||e.key==='Backspace')&&s.selectedId!==rootId){e.preventDefault();actions.deleteNode(s.selectedId)}
      if(e.key==='F2'){e.preventDefault();actions.startEditing(s.selectedId)}
      if((e.metaKey||e.ctrlKey)&&e.key==='z'&&!e.shiftKey){e.preventDefault();actions.undo()}
      if((e.metaKey||e.ctrlKey)&&(e.key==='y'||(e.key==='z'&&e.shiftKey))){e.preventDefault();actions.redo()}
    };
    window.addEventListener('keydown',kh);return()=>window.removeEventListener('keydown',kh);
  },[rootId]);

  const PAD=100;
  const svgW=bounds.w+PAD*2;
  const svgH=bounds.h+PAD*2;

  return h('div',{
    ref:canvasRef,'data-canvas':'1',
    style:{flex:1,position:'relative',overflow:'hidden',cursor:'grab',userSelect:'none',background:theme.canvasBg},
    onMouseDown:mdown,onMouseMove:mmove,onMouseUp:mup,onMouseLeave:mup,
    onClick:e=>{if(e.target===canvasRef.current||e.target.dataset.canvas)actions.selectNode(null)},
  },
  // Grid
  h('div',{
    'data-canvas':'1',
    style:{position:'absolute',inset:0,pointerEvents:'none',
      backgroundImage:`linear-gradient(${theme.gridColor} 1px,transparent 1px),linear-gradient(90deg,${theme.gridColor} 1px,transparent 1px)`,
      backgroundSize:`${40*zoom}px ${40*zoom}px`,backgroundPosition:`${panX}px ${panY}px`}}),
  // SVG + nodes
  h('div',{
    id:'mf-canvas-inner',
    style:{position:'absolute',transform:`translate(${panX}px,${panY}px) scale(${zoom})`,transformOrigin:'0 0',willChange:'transform'}},
    h('svg',{width:svgW,height:svgH,style:{overflow:'visible',display:'block',position:'absolute',top:0,left:0,pointerEvents:'none'}},
      h('defs',null,
        h('marker',{id:'arr',markerWidth:'8',markerHeight:'6',refX:'7',refY:'3',orient:'auto'},
          h('polygon',{points:'0 0, 8 3, 0 6',fill:theme.edgeColor}))),
      Object.entries(layout).map(([nodeId,pos])=>{
        const n=nodes[nodeId];if(!n?.parentId||!layout[n.parentId])return null;
        const pp=layout[n.parentId];
        const x1=PAD+pp.x+NW,y1=PAD+pp.y+NH/2,x2=PAD+pos.x,y2=PAD+pos.y+NH/2;
        const cx=(x1+x2)/2;
        const sd=n.lineType==='dashed'?'8,4':n.lineType==='dotted'?'2,4':'none';
        const sw=n.lineWidth==='thin'?1:n.lineWidth==='thick'?3:1.5;

function Toolbar({onText,onTheme}){
  const map=useStore(s=>s.map);
  const histIdx=useStore(s=>s.histIdx);
  const histLen=useStore(s=>s.history.length);
  const zoom=useStore(s=>s.zoom);
  const canUndo=histIdx>0,canRedo=histIdx<histLen-1;

  function exportJpg(){
    const inner=document.getElementById('mf-canvas-inner');if(!inner)return;
    const svg=inner.querySelector('svg');if(!svg)return;
    const nodes=inner.querySelectorAll('[style*="position: absolute"][style*="left"]');
    const s=getState();const lv=s.map;if(!lv)return;
    const layout=computeLayout(lv.nodes,lv.rootId);
    const bounds=getBounds(layout);
    const PAD=100;
    const W=(bounds.w+PAD*2)*2,H=(bounds.h+PAD*2)*2;
    const theme=THEMES[lv.theme||'dark']||THEMES.dark;
    const svgEl=inner.querySelector('svg');
    const svgData=new XMLSerializer().serializeToString(svgEl);
    const canvas=document.createElement('canvas');
    canvas.width=W;canvas.height=H;
    const ctx=canvas.getContext('2d');
    ctx.fillStyle=theme.canvasBg;ctx.fillRect(0,0,W,H);
    const img=new Image();
    const blob=new Blob([svgData],{type:'image/svg+xml'});
    const url=URL.createObjectURL(blob);
    img.onload=()=>{
      ctx.scale(2,2);ctx.drawImage(img,0,0);URL.revokeObjectURL(url);
      Object.entries(layout).forEach(([nid,pos])=>{
        const n=lv.nodes[nid];if(!n)return;
        const x=PAD+pos.x,y=PAD+pos.y;
        ctx.fillStyle=n.bgColor;
        ctx.beginPath();ctx.roundRect(x,y,NW,NH,n.id===lv.rootId?12:9);ctx.fill();
        ctx.fillStyle=n.textColor;
        ctx.font=`${n.fontStyle?.includes('bold')?'bold ':''} ${n.fontSize||16}px DM Sans,sans-serif`;
        ctx.fillText(n.text||'',x+11,y+NH/2+5,NW-22);
      });
      const link=document.createElement('a');link.download=(lv.name||'mapa')+'.jpg';
      link.href=canvas.toDataURL('image/jpeg',.92);link.click();
    };img.src=url;
  }

  function exportTxt(){
    const m=getState().map;if(!m)return;
    const blob=new Blob([mapToText(m.nodes,m.rootId)],{type:'text/plain;charset=utf-8'});
    const a=document.createElement('a');a.download=m.name+'.txt';a.href=URL.createObjectURL(blob);a.click();
  }

  const btn=(label,onClick,disabled,title)=>h('button',{onClick,disabled,title,
    style:{display:'flex',alignItems:'center',gap:'5px',height:'32px',padding:'0 10px',borderRadius:'var(--r1)',color:disabled?'var(--t3)':'var(--t2)',fontSize:'.82rem',transition:'all .12s',cursor:disabled?'not-allowed':'pointer',opacity:disabled?.35:1},
    onMouseEnter:e=>{if(!disabled){e.currentTarget.style.background='var(--bg3)';e.currentTarget.style.color='var(--t1)'}},
    onMouseLeave:e=>{e.currentTarget.style.background='';e.currentTarget.style.color=disabled?'var(--t3)':'var(--t2)'}},label);

  return h('div',{style:{height:'48px',background:'var(--bg2)',borderBottom:'1px solid var(--b1)',display:'flex',alignItems:'center',padding:'0 10px',gap:'6px',flexShrink:0,zIndex:10}},
    // Left
    h('div',{style:{display:'flex',alignItems:'center',gap:'4px',flex:1}},
      h('button',{onClick:actions.closeMap,title:'Voltar',
        style:{display:'flex',alignItems:'center',justifyContent:'center',width:'32px',height:'32px',borderRadius:'var(--r1)',color:'var(--t2)',transition:'all .12s'},
        onMouseEnter:e=>{e.currentTarget.style.background='var(--bg3)';e.currentTarget.style.color='var(--t1)'},
        onMouseLeave:e=>{e.currentTarget.style.background='';e.currentTarget.style.color='var(--t2)'}},
        '←'),
      h('div',{style:{width:'1px',height:'20px',background:'var(--b1)',margin:'0 4px'}}),
      h('span',{style:{fontFamily:'var(--fd)',fontSize:'.9rem',fontWeight:'600',maxWidth:'200px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},map?.name)),
    // Center
    h('div',{style:{display:'flex',alignItems:'center',gap:'2px'}},
      btn('↩ Desfazer',actions.undo,!canUndo,'Ctrl+Z'),
      btn('↪ Refazer',actions.redo,!canRedo,'Ctrl+Y'),
      h('div',{style:{width:'1px',height:'20px',background:'var(--b1)',margin:'0 4px'}}),
      btn('− Zoom',()=>actions.setZoom(zoom-.15),false,'Zoom out'),
      h('span',{style:{fontSize:'.78rem',color:'var(--t3)',minWidth:'42px',textAlign:'center',fontVariantNumeric:'tabular-nums'}},Math.round(zoom*100)+'%'),
      btn('+ Zoom',()=>actions.setZoom(zoom+.15),false,'Zoom in'),
      btn('⊡',actions.resetView,false,'Centralizar')),
    // Right
    h('div',{style:{display:'flex',alignItems:'center',gap:'4px',flex:1,justifyContent:'flex-end'}},
      btn('≡ Texto',onText,false,'Visualização em texto'),
      btn('● Tema',onTheme,false,'Temas'),
      h('div',{style:{width:'1px',height:'20px',background:'var(--b1)',margin:'0 4px'}}),
      h('button',{onClick:exportJpg,title:'Exportar JPG',
        style:{display:'flex',alignItems:'center',gap:'4px',height:'30px',padding:'0 10px',borderRadius:'var(--r1)',background:'var(--bg3)',border:'1px solid var(--b1)',color:'var(--t2)',fontSize:'.78rem',fontWeight:'500',transition:'all .12s'},
        onMouseEnter:e=>{e.currentTarget.style.borderColor='var(--b3)';e.currentTarget.style.color='var(--t1)'},
        onMouseLeave:e=>{e.currentTarget.style.borderColor='var(--b1)';e.currentTarget.style.color='var(--t2)'}},
        '↓ JPG'),
      h('button',{onClick:exportTxt,title:'Exportar TXT',
        style:{display:'flex',alignItems:'center',gap:'4px',height:'30px',padding:'0 10px',borderRadius:'var(--r1)',background:'var(--bg3)',border:'1px solid var(--b1)',color:'var(--t2)',fontSize:'.78rem',fontWeight:'500',transition:'all .12s'},
        onMouseEnter:e=>{e.currentTarget.style.borderColor='var(--b3)';e.currentTarget.style.color='var(--t1)'},
        onMouseLeave:e=>{e.currentTarget.style.borderColor='var(--b1)';e.currentTarget.style.color='var(--t2)'}},
        '↓ TXT')));
}

      h('div',{style:{padding:'10px 12px'}},
        h('button',{onClick:()=>actions.deleteNode(selectedId),
          style:{display:'flex',alignItems:'center',gap:'6px',padding:'7px 10px',borderRadius:'var(--r1)',background:'rgba(252,92,138,.07)',border:'1px solid rgba(252,92,138,.2)',color:'#fc5c8a',fontSize:'.8rem',width:'100%',transition:'all .12s'},
          onMouseEnter:e=>{e.currentTarget.style.background='rgba(252,92,138,.14)';e.currentTarget.style.borderColor='rgba(252,92,138,.38)'},
          onMouseLeave:e=>{e.currentTarget.style.background='rgba(252,92,138,.07)';e.currentTarget.style.borderColor='rgba(252,92,138,.2)'}},
          '🗑️ Excluir nó e subárvore'))));
}

// ── Modals ──
function TextView({onClose}){
  const map=useStore(s=>s.map);
  const text=um(()=>map?mapToText(map.nodes,map.rootId):'',[map]);
  return h('div',{onClick:onClose,style:{position:'fixed',inset:0,background:'rgba(0,0,0,.65)',backdropFilter:'blur(4px)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000,padding:'24px'}},
    h('div',{onClick:e=>e.stopPropagation(),style:{background:'var(--bg2)',border:'1px solid var(--b2)',borderRadius:'var(--r4)',width:'100%',maxWidth:'580px',maxHeight:'80vh',display:'flex',flexDirection:'column',boxShadow:'0 8px 40px rgba(0,0,0,.7)',animation:'scaleIn .2s ease'}},
      h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 18px',borderBottom:'1px solid var(--b1)'}},
        h('h2',{style:{fontFamily:'var(--fd)',fontSize:'1rem',fontWeight:'700'}},'Visualização em Texto'),
        h('div',{style:{display:'flex',gap:'8px',alignItems:'center'}},
          h('button',{onClick:()=>navigator.clipboard.writeText(text),
            style:{display:'flex',alignItems:'center',gap:'4px',padding:'5px 11px',borderRadius:'var(--r1)',background:'var(--bg3)',border:'1px solid var(--b1)',color:'var(--t2)',fontSize:'.8rem',transition:'all .12s'},
            onMouseEnter:e=>{e.currentTarget.style.color='var(--t1)';e.currentTarget.style.borderColor='var(--b3)'},
            onMouseLeave:e=>{e.currentTarget.style.color='var(--t2)';e.currentTarget.style.borderColor='var(--b1)'}},
            '📋 Copiar'),
          h('button',{onClick:onClose,style:{width:'28px',height:'28px',display:'flex',alignItems:'center',justifyContent:'center',borderRadius:'var(--r1)',color:'var(--t3)',transition:'all .12s'},
            onMouseEnter:e=>{e.currentTarget.style.background='var(--bg3)';e.currentTarget.style.color='var(--t1)'},
            onMouseLeave:e=>{e.currentTarget.style.background='';e.currentTarget.style.color='var(--t3)'}},
            '✕'))),
      h('div',{style:{flex:1,overflowY:'auto',padding:'18px'}},
        h('pre',{style:{fontFamily:'monospace',fontSize:'.86rem',lineHeight:'1.7',color:'var(--t2)',whiteSpace:'pre-wrap',wordBreak:'break-word'}},text))));
}

function ThemePanel({onClose}){
  const map=useStore(s=>s.map);
  const cur=map?.theme||'dark';
  return h('div',{onClick:onClose,style:{position:'fixed',inset:0,background:'rgba(0,0,0,.6)',backdropFilter:'blur(4px)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000,padding:'24px'}},
    h('div',{onClick:e=>e.stopPropagation(),style:{background:'var(--bg2)',border:'1px solid var(--b2)',borderRadius:'var(--r4)',width:'100%',maxWidth:'480px',boxShadow:'0 8px 40px rgba(0,0,0,.7)',animation:'scaleIn .2s ease'}},
      h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 18px',borderBottom:'1px solid var(--b1)'}},
        h('h2',{style:{fontFamily:'var(--fd)',fontSize:'1rem',fontWeight:'700'}},'Temas'),
        h('button',{onClick:onClose,style:{width:'28px',height:'28px',display:'flex',alignItems:'center',justifyContent:'center',borderRadius:'var(--r1)',color:'var(--t3)'}},
          '✕')),
      h('div',{style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'10px',padding:'16px'}},
        Object.entries(THEMES).map(([key,theme])=>
          h('button',{key,onClick:()=>{actions.setTheme(key);onClose()},
            style:{borderRadius:'var(--r2)',overflow:'hidden',border:`${cur===key?'2px solid var(--ac)':'1px solid var(--b1)'}`,transition:'all .2s',cursor:'pointer',background:'transparent'},
            onMouseEnter:e=>{e.currentTarget.style.borderColor=cur===key?'var(--ac)':'var(--b3)';e.currentTarget.style.transform='translateY(-1px)'},
            onMouseLeave:e=>{e.currentTarget.style.borderColor=cur===key?'var(--ac)':'var(--b1)';e.currentTarget.style.transform=''}},
            h('div',{style:{height:'60px',background:theme.canvasBg,display:'flex',alignItems:'center',padding:'8px',gap:'5px'}},
              h('div',{style:{width:'30px',height:'20px',borderRadius:'4px',background:theme.rootDefaults.bgColor,flexShrink:0}}),
              h('div',{style:{width:'10px',height:'1.5px',background:theme.edgeColor,flexShrink:0}}),
              h('div',{style:{display:'flex',flexDirection:'column',gap:'4px'}},
                h('div',{style:{width:'26px',height:'14px',borderRadius:'3px',background:theme.nodeDefaults.bgColor}}),
                h('div',{style:{width:'26px',height:'14px',borderRadius:'3px',background:theme.nodeDefaults.bgColor}}))),
            h('div',{style:{display:'flex',alignItems:'center',gap:'4px',padding:'5px 7px',background:'var(--bg3)'}},
              h('span',{style:{fontSize:'.82rem'}},theme.emoji),
              h('span',{style:{flex:1,fontSize:'.73rem',color:'var(--t2)',fontWeight:'500'}},theme.name),
              cur===key&&h('span',{style:{fontSize:'.72rem',color:'var(--ac)',fontWeight:'700'}},'✓')))))));
}

// ── EditorPage ──
function EditorPage(){
  const[showText,setShowText]=us(false);
  const[showTheme,setShowTheme]=us(false);
  return h('div',{style:{width:'100%',height:'100%',display:'flex',flexDirection:'column',overflow:'hidden'}},
    h(Toolbar,{onText:()=>setShowText(true),onTheme:()=>setShowTheme(true)}),
    h('div',{style:{flex:1,display:'flex',overflow:'hidden'}},
      h(MapCanvas,null),
      h(NodePanel,null)),
    showText&&h(TextView,{onClose:()=>setShowText(false)}),
    showTheme&&h(ThemePanel,{onClose:()=>setShowTheme(false)}));
}

// ── App ──
function App(){
  const[fsReady,setFsReady]=us(false);
  const map=useStore(s=>s.map);

  if(!FS.supported()){
    return h('div',{style:{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)',flexDirection:'column',gap:'16px',padding:'32px',textAlign:'center'}},
      h('div',{style:{fontSize:'3rem'}},'⚠️'),
      h('h1',{style:{fontFamily:'var(--fd)',fontSize:'1.4rem'}},'Navegador não suportado'),
      h('p',{style:{color:'var(--t2)',maxWidth:'380px',lineHeight:'1.6'}},
        'O MindForge requer a File System Access API, disponível no Chrome 86+, Edge 86+ e Opera 72+.'));
  }
  if(!fsReady)return h(WelcomeScreen,{onInit:async()=>{try{const ok=await FS.init();if(ok)setFsReady(true)}catch(e){alert('Erro ao acessar pasta: '+e.message)}}});
  if(map)return h(EditorPage,null);
  return h(HomePage,null);
}

// ── Mount ──
const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(h(App,null));
</script>
</body>
</html>
